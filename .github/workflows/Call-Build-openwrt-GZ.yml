name: Call Build OpenWrt GZ

on:
  workflow_call:
    inputs:
      version:
        type: string
      source_name:
        type: string
      pack:
        type: bool

env:
  PACKAGE: ${{ inputs.source_name }}
  CACHE_PATH: /tmp/.cache
  Build_PATH: ${{ github.workspace }}/Build
  TZ: Asia/Shanghai
  UPLOAD_BIN_DIR: true

jobs:
  jod_compile:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64_generic]      
    steps: 
      - name: Checkout
        uses: actions/checkout@main
        
      - name: Install Dependencies
        run: |
          # DEBIAN_FRONTEND=noninteractive sudo apt-get install -y ccache gettext libncurses5-dev xsltproc
          #sudo apt-get remove gcc g++
      
      - name: Create Directories
        run: |
          # ✅初始化设置
          echo "SOURCE_PATH=$(mktemp -d)" >> $GITHUB_ENV
          test -d "${{ env.Build_PATH }}" || mkdir -pm 755 "${{ env.Build_PATH }}"
          
      - name: Download and Unzip ToolChain
        uses: 3wlh/actions/openwrt/toolchain@main
        id: toolchain
        with:
          arch: ${{ matrix.arch }}
          version: ${{ inputs.version }}
          path: ${{ env.CACHE_PATH }}

      - name: Download and Source
        if: (steps.toolchain.outputs.status == 'success')
        working-directory: ${{ env.SOURCE_PATH }}
        id: source
        run: |
          # ✅拉取编译源码
          git clone https://3wlh:${{ secrets.TOKEN_3WLH }}@github.com/3wlh/Source
          test -d "Source/C++/OpenWrt" && mv Source/C++/OpenWrt ./
          test -d "OpenWrt" && rm -rf Source
          echo "status=success" >> $GITHUB_OUTPUT
        
      - name: Build and Source
        if: (steps.source.outputs.status == 'success')
        working-directory: ${{ env.SOURCE_PATH }}
        id: build
        run: |
          # ✅开始编译源码
          source /etc/profile
          cd "OpenWrt/${{ env.PACKAGE }}"
          files=$(find . -type f -name "*.cpp")
          Argv="-Os -s"
          echo "✅源码文件: ${files}"
          if [ -n "$files" ]; then
            echo "${files}"
            g++ ${files} -o ${{ env.Build_PATH }}/${{ env.PACKAGE }}-${{ matrix.arch }} ${Argv}
          else
            files=$(find . -type f -name "*.c")
            echo ${files}
            gcc ${files} -o ${{ env.Build_PATH }}/${{ env.PACKAGE }}-${{ matrix.arch }} ${Argv}
          fi
          echo "status=success" >> $GITHUB_OUTPUT
          cd -
          
      - name: Upload to bin directory
        uses: actions/upload-artifact@main
        if: steps.build.outputs.status == 'success' && ${{env.UPLOAD_BIN_DIR}} == 'true'
        with:
          name: ${{ env.PACKAGE }}-${{ matrix.arch }}
          path: ${{ env.Build_PATH }}/${{ env.PACKAGE }}-${{ matrix.arch }}

  jod_release:
    name: Upload to Release
    needs: jod_compile
    runs-on: ubuntu-latest
    steps:
      - name: Create Directory
        run: |
          # ✅初始化设置
          sudo timedatectl set-timezone "${TZ}"
          echo "time=$(date "+%Y.%m.%d_%H%M%S")" >> $GITHUB_OUTPUT
          test -d "${{ env.PACKAGE }}" || mkdir -pm 755 "${{ env.PACKAGE }}"

      - name: Download ${{ env.PACKAGE }}
        uses: actions/download-artifact@main
        with:
          path: ${{ env.PACKAGE }}
          merge-multiple: true
      
      - name: Pack into a gz files
        working-directory: ${{ env.PACKAGE }}
        if: (inputs.pack == 'success')
        run: |
          if [ -d "$(pwd)" ] && [ "$(ls -A $(pwd))" ]; then
            tar -zcvf $(pwd).tar.gz *
          if
      
      - name: Check file
        working-directory: ${{ env.PACKAGE }}
        id: check
        run: [[ "$(ls -A $(pwd)/${{ env.PACKAGE }})" ]] && echo "status=success" >> $GITHUB_OUTPUT
        
      - name: Delete GitHub Release
        if: (steps.check.outputs.status == 'success')
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: GitHub-Actions_${{ env.PACKAGE }}
          delete_release: true
          github_token: ${{ github.token }}
      
      - name: Upload to Release
        if: (steps.check.outputs.status == 'success')
        uses: softprops/action-gh-release@master
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: GitHub-Actions_${{ env.PACKAGE }}
          name: OpenWrt：${{ env.PACKAGE }}
          body: |
            ## 软件信息：
            - 编译时间：`${{ env.Time }}`
            - SDK版本: `${{ inputs.version }}`
          files: ${{ env.PACKAGE }}/*